name: Publish

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Derive release version from tag
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync Cargo workspace versions
        run: ./scripts/set-workspace-version.sh "${{ env.RELEASE_VERSION }}"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate publish build
        run: |
          cargo publish -p dioxus-showcase-core --dry-run
          cargo publish -p dioxus-showcase-macros --dry-run
          cargo publish -p dioxus-showcase --dry-run
          cargo publish -p dioxus-showcase-cli --dry-run

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p dioxus-showcase-core
          sleep 20
          cargo publish -p dioxus-showcase-macros
          sleep 20
          cargo publish -p dioxus-showcase
          sleep 20
          cargo publish -p dioxus-showcase-cli

  sync-workspace-version:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Derive release version from tag
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync Cargo workspace versions
        run: ./scripts/set-workspace-version.sh "${{ env.RELEASE_VERSION }}"

      - name: Commit synced versions
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- Cargo.toml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore(release): sync workspace version to ${{ env.RELEASE_VERSION }}"
          git fetch origin "$DEFAULT_BRANCH"
          git rebase "origin/$DEFAULT_BRANCH"
          git push origin HEAD:"$DEFAULT_BRANCH"
