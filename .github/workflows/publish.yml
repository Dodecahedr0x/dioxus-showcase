name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Derive release version from tag
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync Cargo workspace versions
        run: ./scripts/set-workspace-version.sh "${{ env.RELEASE_VERSION }}"

      - name: Commit synced versions
        shell: bash
        run: |
          if git diff --quiet -- Cargo.toml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore(release): sync workspace version to ${{ env.RELEASE_VERSION }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate publish build
        run: cargo publish --workspace --dry-run

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --workspace
