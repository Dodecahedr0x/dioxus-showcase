name: Publish

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Derive release version from tag
        shell: bash
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Verify committed workspace versions
        run: ./scripts/verify-workspace-version.sh "${{ env.RELEASE_VERSION }}"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate publish build
        run: |
          cargo publish -p dioxus-showcase-core --dry-run
          cargo publish -p dioxus-showcase-macros --dry-run
          cargo publish -p dioxus-showcase --dry-run
          cargo publish -p dioxus-showcase-cli --dry-run

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p dioxus-showcase-core
          sleep 20
          cargo publish -p dioxus-showcase-macros
          sleep 20
          cargo publish -p dioxus-showcase
          sleep 20
          cargo publish -p dioxus-showcase-cli
